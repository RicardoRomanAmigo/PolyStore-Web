<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archivo de Productos | PolyStore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a; /* Azul muy oscuro de fondo fijo */
            color: white;
        }
        .product-grid-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }
        .product-grid-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen">

    <nav class="p-6 border-b border-white/10">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-xl font-bold tracking-tighter hover:text-gray-400 transition">
                POLY<span class="text-blue-500">STORE</span>
            </a>
            <a href="index.html" class="text-sm bg-white/10 px-4 py-2 rounded-full hover:bg-white/20 transition">
                Ver Producto Live
            </a>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <header class="text-center mb-16">
            <h1 class="text-5xl font-black mb-4">COLECCIÓN PASADA</h1>
            <p class="text-gray-400 max-w-2xl mx-auto">
                Explora los productos exclusivos que han pasado por nuestro escaparate en directo.
            </p>
        </header>

        <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div id="loader" class="col-span-full text-center py-20">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-blue-500 mx-auto mb-4"></div>
                <p class="text-gray-500 italic">Cargando catálogo...</p>
            </div>
        </div>
    </main>

    <script src="js/archived.js"></script>
</body>
</html>
